baseURL = "https://keeply.work/blog/"
languageCode = "en"
title = "Keeply Blog"
theme = "hugo-theme-stack"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true  # 英文也走 /en/ 子路徑，19 語言一致

# 啟用 emoji
enableEmoji = true

# Build 優化
[build]
  writeStats = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true  # 允許 HTML in markdown
  [markup.highlight]
    noClasses = false
    lineNos = true

[params]
  mainSections = ["post"]
  featuredImageField = "image"
  rssFullContent = true

  [params.footer]
    since = 2026
    customText = "Keeply — Your files have a story."

  [params.sidebar]
    compact = false
    emoji = "📂"
    subtitle = "Version control, reinvented for non-developers."

  # avatar is a string path to an image in assets/
  # [params.sidebar.avatar] — disabled until we add assets/img/avatar.png

  [params.article]
    math = false
    toc = true
    readingTime = true

  [params.comments]
    enabled = false  # Phase 1 不開

# 19 語言設定
[languages]
  [languages.en]
    languageName = "English"
    title = "Keeply Blog"
    weight = 1
    contentDir = "content/english"
  [languages.zh-tw]
    languageName = "繁體中文"
    title = "Keeply 部落格"
    weight = 2
