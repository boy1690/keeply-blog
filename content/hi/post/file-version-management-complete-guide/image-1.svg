<!-- Image 1: 3 personas / 3 filenames — same symptom across professions -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- 3 columns: Designer / Lawyer / Student -->
  <g font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">

    <!-- Designer -->
    <g transform="translate(60, 100)" filter="url(#shadow)">
      <rect width="340" height="380" rx="14" fill="#ffffff"/>
      <rect width="340" height="50" rx="14" fill="url(#g-indigo)"/>
      <rect y="36" width="340" height="14" fill="url(#g-indigo)"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2" font-family="system-ui,sans-serif">DESIGNER</text>
      <!-- file icon + name -->
      <g transform="translate(36, 100)">
        <rect width="44" height="56" rx="4" fill="url(#g-indigo)"/>
        <text x="22" y="38" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">PSD</text>
      </g>
      <text x="36" y="220" font-size="16" font-weight="600" fill="#312E81">_v3_final_</text>
      <text x="36" y="248" font-size="20" font-weight="800" fill="url(#g-amber)">FINAL</text>
      <text x="138" y="248" font-size="20" font-weight="700" fill="#312E81">.psd</text>
      <text x="36" y="320" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">2.4 GB · April 4</text>
    </g>

    <!-- Lawyer -->
    <g transform="translate(430, 100)" filter="url(#shadow)">
      <rect width="340" height="380" rx="14" fill="#ffffff"/>
      <rect width="340" height="50" rx="14" fill="url(#g-indigo)"/>
      <rect y="36" width="340" height="14" fill="url(#g-indigo)"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2" font-family="system-ui,sans-serif">LAWYER</text>
      <g transform="translate(36, 100)">
        <rect width="44" height="56" rx="4" fill="url(#g-indigo)"/>
        <text x="22" y="38" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">DOC</text>
      </g>
      <text x="36" y="220" font-size="14" font-weight="600" fill="#312E81">contract_v7_</text>
      <text x="36" y="246" font-size="14" font-weight="600" fill="#312E81">clientcopy_</text>
      <text x="36" y="272" font-size="14" font-weight="800" fill="url(#g-amber)">2025-04-15</text>
      <text x="36" y="298" font-size="14" font-weight="700" fill="#312E81">.docx</text>
      <text x="36" y="340" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">187 KB · April 15</text>
    </g>

    <!-- Student -->
    <g transform="translate(800, 100)" filter="url(#shadow)">
      <rect width="340" height="380" rx="14" fill="#ffffff"/>
      <rect width="340" height="50" rx="14" fill="url(#g-indigo)"/>
      <rect y="36" width="340" height="14" fill="url(#g-indigo)"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2" font-family="system-ui,sans-serif">STUDENT</text>
      <g transform="translate(36, 100)">
        <rect width="44" height="56" rx="4" fill="url(#g-indigo)"/>
        <text x="22" y="38" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">DOC</text>
      </g>
      <text x="36" y="220" font-size="14" font-weight="600" fill="#312E81">thesis_ch3_</text>
      <text x="36" y="246" font-size="14" font-weight="600" fill="#312E81">post-advisor_</text>
      <text x="36" y="272" font-size="14" font-weight="800" fill="url(#g-amber)">truly-final</text>
      <text x="36" y="298" font-size="14" font-weight="700" fill="#312E81">_v2.docx</text>
      <text x="36" y="340" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">3.1 MB · April 12</text>
    </g>

  </g>

  <!-- Bottom caption -->
  <text x="600" y="540" font-size="20" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="3">DIFFERENT JOBS · SAME SYMPTOM</text>

</svg>
