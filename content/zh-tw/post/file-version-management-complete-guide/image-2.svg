<!-- Image 2: Dropbox right-click menu — "version history" hidden as 4th item -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312E81" flood-opacity="0.16"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Background folder ghost (file you right-clicked on) -->
  <g transform="translate(80, 90)" opacity="0.5">
    <rect width="500" height="320" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect width="500" height="40" rx="10" fill="url(#g-indigo)"/>
    <rect y="30" width="500" height="10" fill="url(#g-indigo)"/>
    <text x="20" y="26" font-size="13" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">📁 Documents › Q4 Pitch</text>
    <!-- File rows -->
    <g font-family="'JetBrains Mono',ui-monospace,monospace">
      <rect y="50" width="500" height="36" fill="#ffffff"/>
      <text x="20" y="74" font-size="13" font-weight="500" fill="#6F6AF0">📄 pitch.pptx</text>
      <rect y="86" width="500" height="36" fill="#F8F7FF"/>
      <text x="20" y="110" font-size="13" font-weight="500" fill="#6F6AF0">📄 pitch_v2.pptx</text>
      <rect y="122" width="500" height="36" fill="#FEF3C7" stroke="url(#g-amber)" stroke-width="1.5"/>
      <text x="20" y="146" font-size="13" font-weight="700" fill="#312E81">📄 pitch_final.pptx  ← right-clicked</text>
    </g>
  </g>

  <!-- Right-click context menu (the protagonist) -->
  <g transform="translate(530, 200)" filter="url(#shadow)">
    <rect width="440" height="380" rx="10" fill="#ffffff" stroke="#E0E7FF" stroke-width="1"/>

    <!-- Menu items -->
    <g font-family="system-ui,sans-serif">
      <!-- Item 1: Open -->
      <rect y="14" width="440" height="42" fill="transparent"/>
      <text x="24" y="42" font-size="17" font-weight="500" fill="#312E81">Open</text>
      <text x="416" y="42" font-size="14" font-weight="500" fill="#6F6AF0" opacity="0.5" text-anchor="end">⌘O</text>

      <!-- Item 2: Share -->
      <rect y="56" width="440" height="42" fill="transparent"/>
      <text x="24" y="84" font-size="17" font-weight="500" fill="#312E81">Share...</text>

      <!-- Item 3: Copy link -->
      <rect y="98" width="440" height="42" fill="transparent"/>
      <text x="24" y="126" font-size="17" font-weight="500" fill="#312E81">Copy link</text>

      <!-- Divider -->
      <line x1="20" y1="148" x2="420" y2="148" stroke="#E0E7FF" stroke-width="1"/>

      <!-- Item 4 (THE HIGHLIGHTED ONE): Version history -->
      <rect y="156" width="440" height="48" fill="#FFFBEB" stroke="url(#g-amber)" stroke-width="2" rx="4"/>
      <text x="24" y="186" font-size="17" font-weight="800" fill="url(#g-amber)">Version history</text>
      <text x="416" y="186" font-size="14" font-weight="500" fill="#F59E0B" text-anchor="end">▸</text>

      <!-- Divider -->
      <line x1="20" y1="216" x2="420" y2="216" stroke="#E0E7FF" stroke-width="1"/>

      <!-- Item 5: Rename -->
      <rect y="224" width="440" height="42" fill="transparent"/>
      <text x="24" y="252" font-size="17" font-weight="500" fill="#312E81">Rename</text>

      <!-- Item 6: Move to... -->
      <rect y="266" width="440" height="42" fill="transparent"/>
      <text x="24" y="294" font-size="17" font-weight="500" fill="#312E81">Move to...</text>

      <!-- Item 7: Delete -->
      <rect y="308" width="440" height="42" fill="transparent"/>
      <text x="24" y="336" font-size="17" font-weight="500" fill="#DC2626">Delete</text>
    </g>
  </g>

  <!-- Pointing arrow + label -->
  <g transform="translate(990, 280)">
    <path d="M0 110 Q-10 60 -10 0" stroke="url(#g-amber)" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="20" y="80" font-size="18" font-weight="700" fill="#312E81">4th item</text>
    <text x="20" y="106" font-size="18" font-weight="700" fill="#312E81">in the menu</text>
    <text x="20" y="130" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7">most users miss it</text>
  </g>

  <!-- Top label: Dropbox brand context -->
  <g transform="translate(80, 60)">
    <text x="0" y="0" font-size="14" font-weight="800" fill="#312E81" letter-spacing="3">DROPBOX RIGHT-CLICK MENU</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="url(#g-amber)"/>
    </marker>
  </defs>

</svg>
